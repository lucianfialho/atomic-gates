    - app/api/logout/route.ts
    - lib/auth/session.ts
  new_behavior: "POST /api/logout reads the session cookie, calls deleteRefreshToken(sessionId) to invalidate the server-side refresh token, clears the session cookie via Set-Cookie: session=; Max-Age=0, and returns 204 No Content."
