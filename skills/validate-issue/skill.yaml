id: validate-issue
version: 1
description: >
  Verify that a PR implementation covers every discrete requirement stated
  in its linked GitHub issue. Runs as a 4-state machine: fetch → extract
  requirements → check coverage → emit verdict.

inputs:
  required:
    - name: issue_number
      type: integer
    - name: pr_number
      type: integer

initial_state: fetch

states:

  fetch:
    description: Fetch issue body and PR diff from GitHub
    agent_prompt: |
      Use the gh CLI to fetch both the issue and the PR.

      Required data:
        1. Issue #{{inputs.issue_number}} — title, body, and all comments
        2. PR #{{inputs.pr_number}} — files changed and the full diff

      Commands to run:
        gh issue view {{inputs.issue_number}} --json title,body,comments
        gh pr view {{inputs.pr_number}} --json files,title,body
        gh pr diff {{inputs.pr_number}}

      Emit a YAML file at:
        {{output_path}}

      with this shape:
        issue:
          title: string
          body: string
          comments: [string]
        pr:
          title: string
          body: string
          files_changed: [string]
          diff: string
    output_schema: skills/validate-issue/schemas/fetch.output.schema.json
    transitions:
      - to: extract_requirements

  extract_requirements:
    description: Extract discrete requirements from the issue
    agent_prompt: |
      Read the previous state's output, which is available as {{output.issue}}.

      Extract every discrete requirement, acceptance criterion, or "must"
      statement from the issue body and comments. Each requirement should
      stand on its own as a testable assertion.

      Emit YAML at {{output_path}}:
        requirements:
          - id: req-1
            statement: "User can log out via /api/logout"
            source: "issue body"
          - id: req-2
            statement: "Logout clears the session cookie"
            source: "comment by @alice"

      If the issue has no clear requirements, emit an empty list. The next
      state will handle that case.
    transitions:
      - to: check_coverage

  check_coverage:
    description: For each requirement, look for evidence in the PR diff
    agent_prompt: |
      You have two previous outputs available:
        - Requirements list at {{outputs.extract_requirements}}
        - PR diff at {{outputs.fetch}}

      For each requirement, grep the diff for concrete evidence. Evidence
      must be a specific file and line range, not a vague reference.

      Emit YAML at {{output_path}}:
        coverage:
          - requirement_id: req-1
            status: met
            evidence:
              file: app/api/logout/route.ts
              lines: [12, 48]
          - requirement_id: req-2
            status: missing
            evidence: null
            reason: "No clearSession() or cookie deletion found in diff"

      Status must be one of: met, missing, uncertain.
      Never mark a requirement as `met` without a file:line citation.
    transitions:
      - to: emit_verdict

  emit_verdict:
    description: Aggregate coverage into a final verdict
    agent_prompt: |
      Read the coverage from the previous state ({{output.coverage}}).

      Produce a final verdict at {{output_path}}:
        verdict: COMPLETE | INCOMPLETE | NEEDS_DISCUSSION
        met: [req-ids]
        missing: [req-ids]
        uncertain: [req-ids]
        summary: "One-sentence summary of the situation"

      Rules:
        - COMPLETE only if every requirement has status: met
        - INCOMPLETE if any requirement is missing
        - NEEDS_DISCUSSION if requirements are extracted but the coverage
          check returned only uncertain results
    transitions:
      - to: done

  done:
    terminal: true
    description: Machine finished — final verdict is available in emit_verdict.output.yaml
