version: 1
registered_at: 2026-04-17
registered_by: lucian@metricasboss.com.br
subject: atomic-gates + claude-dev-pipeline
protocol: kill-my-idea — each claim has a kill_criterion decided BEFORE data is observed.

hypotheses:
  - id: H1
    claim: >
      Machine-level gates (gate: [] inside skill.yaml states) fire frequently
      enough to catch real errors during normal dev work.
    kill_criterion: >
      If <1 gate_failure per 10 terminal runs across all observed projects,
      claim is dead — gates are silent theater in practice.
    cheapest_test: retrospective analysis of existing .gates/runs/
    status: pending

  - id: H2
    claim: >
      State-machine skills complete reliably — runs reach a terminal state
      without getting stuck mid-flight.
    kill_criterion: >
      If >15% of runs end up in status=running with >24h since last update,
      claim is dead — the machine leaks.
    cheapest_test: retrospective status count
    status: pending

  - id: H3
    claim: >
      The pipeline is actually used end-to-end — validate-issue (requirements
      coverage check) runs as part of the standard loop, not as an afterthought.
    kill_criterion: >
      If validate-issue runs <1× for every 5 solve-issue runs in the same
      project, claim is dead — the rigor skills are decorative.
    cheapest_test: retrospective skill_id distribution
    status: pending

  - id: H4
    claim: >
      Skeleton skills (generated by import_skill.py without human refinement)
      do NOT block the loop — the runner handles them gracefully.
    kill_criterion: >
      If any skeleton skill run ends in status=running stuck on a meta-section
      state (e.g. 'usage', 'overview'), claim is dead — skeletons are a trap.
    cheapest_test: retrospective + inspect stuck runs
    status: pending

